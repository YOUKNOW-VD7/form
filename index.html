<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulaire Supabase</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      text-align: center;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d8dee9;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }
    input:focus {
      border-color: #4c7dff;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #4c7dff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #3d6bf0;
    }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
    }
    .success { background: #e8fff1; color: #116b35; }
    .error { background: #ffecec; color: #a10000; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Formulaire</h1>

    <form id="contactForm">
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Votre email" required>

      <button type="submit">Envoyer</button>
    </form>

    <div id="message" class="msg"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://iupsxuhxkjhaozkrictw.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1cHN4dWh4a2poYW96a3JpY3R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxOTU1MzcsImV4cCI6MjA5Mjc3MTUzN30.kXQ6B9sJM0E_EmPIoRXx5R52DminS96TrkGwO7nkgJ0";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("contactForm");
    const message = document.getElementById("message");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "msg " + type;
      message.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nom = document.getElementById("nom").value.trim();
      const email = document.getElementById("email").value.trim();

      const { data, error } = await supabase
        .from("formulaires")
        .insert([{ nom, email }])
        .select();

      if (error) {
        showMessage("Erreur: " + error.message, "error");
        return;
      }

      showMessage("✅ Envoyé avec succès.", "success");
      form.reset();
      console.log("Donnée enregistrée :", data);
    });
  </script>
</body>
</html>
